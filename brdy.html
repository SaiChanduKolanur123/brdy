<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Wishes</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('/attachments/vDfcXKCTsfRLAGt5huNJP.jpeg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Georgia', serif;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }
    .overlay {
      background: rgba(0,0,0,0.6);
      padding: 50px;
      margin-top: 15%;
      border-radius: 15px;
      animation: fadeIn 3s ease-in-out;
    }
    h1 {
      font-size: 3.5em;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 8px #000;
      animation: glow 2s ease-in-out infinite alternate;
    }
    p {
      font-size: 1.4em;
      line-height: 1.8em;
      opacity: 0;
      transition: opacity 2s ease-in-out;
      white-space: pre-line;
    }
    iframe {
      display: none; /* keep music hidden */
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    @keyframes glow {
      from {text-shadow: 2px 2px 8px #000;}
      to {text-shadow: 2px 2px 20px #ff69b4;}
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>🎉 Happy Birthday! 🎉</h1>
    <p id="message">Wishing you endless joy and wonder...</p>
  </div>

  <!-- YouTube BGM autoplay -->
  <iframe id="bgm" width="0" height="0" 
    src="https://www.youtube.com/embed/XfKSsUHyC3w?autoplay=1&loop=1&playlist=XfKSsUHyC3w" 
    frameborder="0" allow="autoplay">
  </iframe>

  <script>
    // After 5 seconds, fade in your custom message
    setTimeout(() => {
      const msg = document.getElementById('message');
      msg.innerText = 
        "You feel like the prayer I never spoke, fulfilled in its purest form. The finest gift existence can offer is simply you—your presence that turns time itself into meaning. I often look into the air and wonder what force I should thank for having you. With you, even thankfulness feels small, because words collapse under the truth of what you mean to me. To have you is to know that existence can be more than survival—it can be grace, it can be wonder, it can be joy beyond measure.\n\nAnd in that joy, I can say with certainty: no emperor, no saint, no sage in all of history has ever conquered the kind of richness I feel in your presence. What they sought in kingdoms, scriptures, or silence—I have found in you.";
      msg.style.opacity = 1;
    }, 5000);
  </script>
</body>
</html>
