<!-- Background music -->
<audio id="bgm" src="bgm.mp3" loop></audio>

<!-- Sound effects -->
<audio id="popSound" src="pop.mp3"></audio>
<audio id="crackerSound" src="cracker.mp3"></audio>

<script>
function startShow() {
  document.documentElement.requestFullscreen?.();
  document.getElementById('tapMessage').style.display = 'none';

  const balloonContainer = document.getElementById('balloons');
  const crackerContainer = document.getElementById('crackers');
  balloonContainer.style.display = 'block';
  crackerContainer.style.display = 'block';

  // Balloons + crackers together
  for (let i = 0; i < 30; i++) {
    const b = document.createElement('div');
    b.className = 'heartBalloon';
    b.style.left = Math.random() * 100 + 'vw';
    balloonContainer.appendChild(b);

    const c = document.createElement('div');
    c.className = 'cracker';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = Math.random() * 100 + 'vh';
    crackerContainer.appendChild(c);
  }

  // Play sounds together
  setTimeout(() => {
    document.getElementById('popSound').play();
    document.getElementById('crackerSound').play();
  }, 2000);

  // After 5s → show birthday message + lips
  setTimeout(() => {
    balloonContainer.innerHTML = '';
    crackerContainer.innerHTML = '';
    const msg = document.getElementById('birthdayMsg');
    msg.style.display = 'block';

    // spawn millions of 💋 emojis
    for (let i = 0; i < 5000; i++) {
      const lip = document.createElement('div');
      lip.textContent = '💋';
      lip.style.position = 'absolute';
      lip.style.left = Math.random() * 100 + 'vw';
      lip.style.top = Math.random() * 100 + 'vh';
      lip.style.fontSize = (Math.random() * 20 + 10) + 'px';
      lip.style.opacity = Math.random();
      document.body.appendChild(lip);
      setTimeout(() => lip.remove(), 2000); // remove after 2s
    }
  }, 5000);

  // After 7s → hide message, show photo + bgm
  setTimeout(() => {
    document.getElementById('birthdayMsg').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    const bgm = document.getElementById('bgm');
    bgm.volume = 1.0;
    bgm.play();
  }, 7000);
}
</script>
