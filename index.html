<!-- Sound effects -->
<audio id="popSound" src="pop.mp3.mp3" preload="auto"></audio>
<audio id="crackerSound" src="cracker.mp3.mp3" preload="auto"></audio>

<script>
  // Clone audio so multiple sounds can overlap
  function playClone(id) {
    const original = document.getElementById(id);
    const clone = original.cloneNode(true);
    document.body.appendChild(clone);
    clone.currentTime = 0;
    clone.play().catch(()=>{});
    clone.onended = () => clone.remove(); // clean up
  }

  // Example usage inside your loops:
  // Balloons
  if (i % 2 === 0) {
    setTimeout(() => playClone('popSound'), i * 250);
  }

  // Crackers
  setTimeout(() => playClone('crackerSound'), i * 400);
</script>
