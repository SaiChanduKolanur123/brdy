<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Wishes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Georgia&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: black;
      overflow: hidden;
      font-family: 'Georgia', serif;
      color: white;
      touch-action: manipulation;
    }
    #tapMessage {
      font-size: 1.4em;
      text-align: center;
      animation: blink 1s infinite;
      position: absolute; top: 40%; width: 100%;
      padding: 0 10px;
      z-index: 100;
      pointer-events: auto;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #balloons, #crackers, #main, #birthdayMsg { display: none; }
    
    .heartBalloon {
      position: absolute;
      width: 100px; height: 100px;
      clip-path: path("M24 4C12 -4 0 6 0 18c0 12 24 28 24 28s24-16 24-28C48 6 36 -4 24 4z");
      animation: rise 6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rise {
      0% { transform: translateY(100vh) scale(1); opacity: 1; }
      100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }
    .cracker {
      position: absolute;
      width: 18px; height: 18px;
      background: gold;
      border-radius: 50%;
      animation: burst 2s ease-out forwards;
      pointer-events: none;
    }
    @keyframes burst {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(12); opacity: 0; }
    }
    
    #birthdayMsg {
      text-align: center;
      position: absolute; top: 35%; width: 100%;
      background: black;
      padding: 20px;
      animation: fadeInText 2s ease-in forwards;
      z-index: 10;
    }
    #birthdayMsg p { margin: 0; }
    #birthdayMsg .headline {
      font-size: 2.5em;
      color: #ffffff;
      font-family: 'Great Vibes', cursive;
    }
    #birthdayMsg .subline {
      font-size: 1.2em;
      font-family: 'Georgia', serif;
      color: #ffffff;
      margin-top: 8px;
    }
    
    #main {
      height: 100vh; width: 100vw;
      background: url('brdy.jpeg') no-repeat center -80px;
      background-size: contain;
      background-color: black;
      position: relative;
    }
    #overlay {
      background: rgba(0,0,0,0.4);
      position: absolute; bottom: 2%; left: 5%;
      width: 90%; text-align: center;
      border-radius: 12px;
      pointer-events: none;
    }
    #overlay p {
      font-size: 0.88em;
      line-height: 1.5em;
      animation: fadeInText 3s ease-in forwards;
      opacity: 0;
      max-width: 90%;
      margin: 10px auto;
      padding: 0 8px;
    }
    @keyframes fadeInText { to { opacity: 1; } }
  </style>
</head>
<body onclick="startShow()">
  <div id="tapMessage">Your Eternal Majesty, let your gentle touch awaken the night—one tap my lady</div>
