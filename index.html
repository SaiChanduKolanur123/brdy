<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Wishes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"> <!-- ensures fit on flip phones -->
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      background: url('/attachments/vDfcXKCTsfRLAGt5huNJP.jpeg') no-repeat center center;
      background-size: cover;
      font-family: 'Georgia', serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); /* soften background */
      z-index: 0;
    }
    .overlay {
      position: relative;
      z-index: 2;
      padding: 15px;
      border-radius: 12px;
      max-width: 95%;
      animation: fadeIn 3s ease-in-out;
    }
    h1 {
      font-size: 2em; /* smaller for flip phones */
      margin-bottom: 15px;
      text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
      animation: glow 2s ease-in-out infinite alternate;
    }
    p {
      font-size: 1em;
      line-height: 1.4em;
      opacity: 0;
      transition: opacity 2s ease-in-out;
      white-space: pre-line;
    }
    iframe { display: none; }

    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    @keyframes glow {
      from {text-shadow: 0 0 10px #ff69b4;}
      to {text-shadow: 0 0 20px #ff1493, 0 0 30px #ff69b4;}
    }

    /* Balloons */
    .balloon {
      position: absolute;
      bottom: -80px;
      width: 40px;
      height: 60px;
      background: red;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: rise 3s ease-out forwards;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Balloons container -->
  <div id="balloons"></div>

  <div class="overlay">
    <h1>🎉 Happy Birthday! 🎉</h1>
    <p id="message">Wishing you endless joy and wonder...</p>
  </div>

  <!-- YouTube BGM autoplay -->
  <iframe id="bgm" width="0" height="0" 
    src="https://www.youtube.com/embed/XfKSsUHyC3w?autoplay=1&loop=1&playlist=XfKSsUHyC3w" 
    frameborder="0" allow="autoplay">
  </iframe>

  <script>
    // Generate 24 balloons across the screen
    const balloonContainer = document.getElementById('balloons');
    for (let i = 0; i < 24; i++) {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = Math.random() * 100 + 'vw';
      b.style.animationDelay = (Math.random() * 1.5) + 's';
      balloonContainer.appendChild(b);
    }

    // After 4 seconds, remove balloons and show message
    setTimeout(() => {
      balloonContainer.innerHTML = '';
      const msg = document.getElementById('message');
      msg.innerText = 
        "You feel like the prayer I never spoke, fulfilled in its purest form. The finest gift existence can offer is simply you—your presence that turns time itself into meaning. I often look into the air and wonder what force I should thank for having you. With you, even thankfulness feels small, because words collapse under the truth of what you mean to me. To have you is to know that existence can be more than survival—it can be grace, it can be wonder, it can be joy beyond measure.\n\nAnd in that joy, I can say with certainty: no emperor, no saint, no sage in all of history has ever conquered the kind of richness I feel in your presence. What they sought in kingdoms, scriptures, or silence—I have found in you.";
      msg.style.opacity = 1;
    }, 4000);

    // After 19 seconds (4s balloons + 15s message), exit fullscreen effect
    setTimeout(() => {
      document.body.style.height = "auto";
      document.body.style.overflow = "auto";
    }, 19000);
  </script>
</body>
</html>
